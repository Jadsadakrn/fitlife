<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitLife Easy — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="login_new.css" />
</head>

<body class="login-body">

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="grid-noise"></div>
  </div>

  <main class="auth-shell">
    <section class="panel">
      <div class="card">
        <div class="card-head">
          <h3 id="authTitle">เข้าสู่ระบบ</h3>
          <p class="muted" id="authSub">เข้าสู่ระบบด้วยอีเมลและรหัสผ่าน</p>
        </div>

        <div class="auth-tabs" id="authTabs">
          <button class="tab active" type="button" data-tab="login">Login</button>
          <button class="tab" type="button" data-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form" data-pane="login" novalidate>
          <label class="field">
            <span>อีเมล</span>
            <div class="input">
              <i class="fa-solid fa-envelope"></i>
              <input id="loginEmail" type="email" placeholder="you@example.com" />
            </div>
          </label>

          <label class="field">
            <span>รหัสผ่าน</span>
            <div class="input">
              <i class="fa-solid fa-lock"></i>
              <input id="loginPassword" type="password" placeholder="รหัสผ่านของคุณ" />
              <button class="pw-toggle" type="button" id="pwToggle">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </label>

          <div class="row">
            <label class="check">
              <input type="checkbox" id="remember" checked />
              <span>จำฉันไว้</span>
            </label>
            <button class="link" type="button" id="goForgot">ลืมรหัสผ่าน?</button>
          </div>

          <button class="btn" type="submit">
            <span>เข้าใช้งาน</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <form id="forgotForm" class="auth-form hidden" data-pane="forgot" novalidate>
          <label class="field">
            <span>กรอกอีเมลเพื่อกู้คืนรหัสผ่าน</span>
            <div class="input">
              <i class="fa-solid fa-envelope"></i>
              <input id="forgotEmail" type="email" placeholder="you@example.com" />
            </div>
          </label>

          <button class="btn" type="submit">
            <span>ยืนยันตัวตน</span>
            <i class="fa-solid fa-paper-plane"></i>
          </button>

          <div class="row-center">
            <button class="link" type="button" id="backToLogin1">กลับไปหน้าล็อกอิน</button>
          </div>
        </form>

        <form id="resetForm" class="auth-form hidden" data-pane="reset" novalidate>
          <label class="field">
            <span>ระบุรหัสผ่านใหม่</span>
            <div class="input">
              <i class="fa-solid fa-key"></i>
              <input id="newPassword" type="password" placeholder="อย่างน้อย 4 ตัวอักษร" />
            </div>
          </label>

          <button class="btn" type="submit">
            <span>บันทึกรหัสผ่านใหม่</span>
            <i class="fa-solid fa-save"></i>
          </button>
          
          <div class="row-center">
            <button class="link" type="button" id="backToLogin2">ยกเลิก</button>
          </div>
        </form>

        <form id="registerForm" class="auth-form hidden" data-pane="register" novalidate>
          <label class="field">
            <span>อีเมล</span>
            <div class="input">
              <i class="fa-solid fa-envelope"></i>
              <input id="regEmail" type="email" placeholder="you@example.com" />
            </div>
          </label>
          <label class="field">
            <span>รหัสผ่าน</span>
            <div class="input">
              <i class="fa-solid fa-lock"></i>
              <input id="regPassword" type="password" placeholder="อย่างน้อย 4 ตัวอักษร" />
            </div>
          </label>
          <label class="field">
            <span>ยืนยันรหัสผ่าน</span>
            <div class="input">
              <i class="fa-solid fa-lock"></i>
              <input id="regPassword2" type="password" placeholder="พิมพ์อีกครั้ง" />
            </div>
          </label>
          <button class="btn" type="submit">
            <span>สร้างบัญชีใหม่</span>
            <i class="fa-solid fa-user-plus"></i>
          </button>
        </form>
      </div>

      <footer class="footer">
        <span>© FitLife Easy</span>
      </footer>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="auth.js"></script>
  <script src="login_new.js"></script>

</body>
</html>
